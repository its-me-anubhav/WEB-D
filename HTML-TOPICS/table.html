<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    
    <table border="10">
        <thead> 
    <th>Student I'd</th>
    <th>Student Name</th>
    <th>Gender</th>
    <th>Age</th>
        </thead>
        <tbody>
            <tr>
                <td>1</td>  
                <td>Adarsh</td>  
                <!-- for row extend -->
                <td rowspan="4">Male</td> 
                <td rowspan="4">19</td>  
            </tr>
            <tr>
                <td>2</td>  
                <td>Anubhav</td>  
            </tr>
            <tr>
                <td>3</td>  
                <td>Vishal</td>    
            </tr>
            <tr>
                <td>4</td>  
                <td>Rishabh</td>  
            </tr>
            <tr> 
                <td>5</td>   
                <td colspan="3">Raj</td>  
                       <!-- for colomn extend -->
            </tr>
        </tbody>
    </table>
</body>
</html>
